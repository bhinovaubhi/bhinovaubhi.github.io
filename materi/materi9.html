<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Terima Kasih</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

      
             body {
    font-family: Inter, Arial, sans-serif;
    background: #020617;
    overflow-x: hidden;
    overflow-y: auto;
}

        /* BACKGROUND */
        .slide {
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            padding: 30px 20px 90px;
            background:
                radial-gradient(circle at 15% 20%, rgba(59, 130, 246, .24), transparent 30%),
                radial-gradient(circle at 85% 25%, rgba(168, 85, 247, .22), transparent 30%),
                radial-gradient(circle at 50% 80%, rgba(34, 211, 238, .12), transparent 28%),
                linear-gradient(135deg, #020617, #0f172a, #111827, #1e1b4b);
        }

        /* GRID */
        .grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, .04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .04) 1px, transparent 1px);
            background-size: 42px 42px;
            animation: gridMove 12s linear infinite;
            opacity: .45;
        }

        @keyframes gridMove {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(42px);
            }
        }

        /* BLOBS */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: .35;
            animation: floatBlob 8s ease-in-out infinite;
        }

        .b1 {
            width: 260px;
            height: 260px;
            background: #3b82f6;
            top: -70px;
            left: -70px;
        }

        .b2 {
            width: 240px;
            height: 240px;
            background: #8b5cf6;
            right: -50px;
            bottom: -50px;
            animation-delay: 2s;
        }

        @keyframes floatBlob {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(20px, -12px) scale(1.08);
            }
        }

        /* CONTENT */
        .wrapper {
            position: relative;
            z-index: 2;
            max-width: 1280px;
            margin: auto;
            height: 100%;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            animation: fadeDown .8s ease;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .08);
            backdrop-filter: blur(12px);
        }

        .content {
            margin-top: 50px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .label {
            color: #60a5fa;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        .title {
            font-size: 68px;
            font-weight: 900;
            line-height: 1.05;
            color: #fff;
            animation: fadeUp 1s ease;
        }

        .gradient {
            background: linear-gradient(90deg, #60a5fa, #a855f7, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .line {
            width: 230px;
            height: 5px;
            border-radius: 999px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #22d3ee);
            margin: 22px 0;
            animation: pulseLine 2s infinite;
        }

        @keyframes pulseLine {

            0%,
            100% {
                transform: scaleX(1);
            }

            50% {
                transform: scaleX(1.08);
            }
        }

        .desc {
            font-size: 24px;
            line-height: 1.6;
            color: rgba(255, 255, 255, .82);
            animation: fadeUp 1.2s ease;
        }

        .quote {
            margin-top: 28px;
            padding: 22px;
            border-radius: 22px;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            animation: glowBox 2s infinite alternate;
        }

        @keyframes glowBox {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-4px);
                box-shadow: 0 0 24px rgba(34, 211, 238, .18);
            }
        }

        /* PHOTO */
        .photo-wrap {
            display: flex;
            justify-content: center;
            position: relative;
            animation: zoomIn 1.2s ease;
        }

        .photo-ring {
            position: absolute;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, .14);
            animation: spin 16s linear infinite;
        }

        .photo-ring.two {
            width: 340px;
            height: 340px;
            animation-direction: reverse;
            animation-duration: 10s;
        }

        @keyframes spin {
            from {
                transform: rotate(0);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .photo {
            width: 320px;
            height: 420px;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            z-index: 2;
            border: 2px solid rgba(255, 255, 255, .12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, .35);
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: floatImg 4s ease-in-out infinite;
        }

        @keyframes floatImg {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* BOTTOM */
        .bottom {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .btn {
            padding: 14px 22px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, .1);
            background: rgba(255, 255, 255, .06);
            color: #fff;
            text-decoration: none;
            transition: .25s;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, .12);
        }

        /* MOBILE */
        @media(max-width:980px) {
            .content {
                grid-template-columns: 1fr;
            }

            .title {
                font-size: 48px;
                text-align: center;
            }

            .desc,
            .quote,
            .label {
                text-align: center;
            }

            .line {
                margin: 22px auto;
            }

            .photo {
                width: 280px;
                height: 370px;
            }
        }

        @media(max-width:768px) {
            .title {
                font-size: 38px;
            }

            .desc {
                font-size: 18px;
            }

            .quote {
                font-size: 22px;
            }

            .bottom {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

    <div class="slide">

        <div class="grid"></div>
        <div class="blob b1"></div>
        <div class="blob b2"></div>

        <div class="wrapper">

            <!-- TOP -->
            <div class="topbar">

                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 rounded-xl bg-blue-500/20 flex items-center justify-center">
                        <i class="fas fa-heart text-blue-400 text-xl"></i>
                    </div>

                    <div>
                        <div class="text-white font-semibold text-sm">Bhinova 2026</div>
                        <div class="text-white/50 text-xs">Slide Final - Thank You</div>
                    </div>
                </div>

                <div class="glass px-4 py-2 rounded-xl text-white/80 text-sm">
                    <i class="fas fa-star mr-2 text-yellow-400"></i> Sampai Jumpa
                </div>

            </div>

            <!-- CONTENT -->
            <div class="content">

                <!-- LEFT -->
                <div>

                    <div class="label">Terima Kasih</div>

                    <h1 class="title">
                        <span class="gradient">THANK YOU</span><br>
                        Semua Hebat!
                    </h1>

                    <div class="line"></div>

                    <div class="desc">
                        Terima kasih sudah mengikuti Bhinova hari ini.<br>
                        Terus belajar, terus berkembang, dan manfaatkan AI untuk masa depanmu.
                    </div>

                    <div class="glass quote">
                        🚀 Kreatif + Skill + AI = Masa Depan Cerah
                    </div>

                </div>

                <!-- RIGHT -->
                <div class="photo-wrap">

                    <div class="photo-ring"></div>
                    <div class="photo-ring two"></div>

                    <div class="photo">
                        <img src="../myphoto.jpg" alt="Foto Pemateri">
                    </div>

                </div>

            </div>

            <!-- BOTTOM -->
            <div class="bottom">

                <div class="text-white/45 text-sm">
                    Powered by Bhinova 2026
                </div>

                <a href="../index.html" class="btn">
                    <i class="fas fa-house mr-2"></i>Kembali ke Home
                </a>

            </div>

        </div>
    </div>

</body>

</html>
